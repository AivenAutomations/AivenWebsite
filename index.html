<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aiven Automations — AI Automation Systems for Service Businesses</title>
  <link rel="stylesheet" href="assets/tokens.css">
  <link rel="stylesheet" href="assets/site.css">
  <link rel="stylesheet" href="assets/bg-theme.css">
  <link rel="stylesheet" href="assets/animations.css">
</head>
<body data-theme="light">

  <!-- Scroll progress bar -->
  <div class="scroll-progress" id="scrollProgress" aria-hidden="true"></div>

  <!-- Animated background stage -->
  <div class="bg-stage" aria-hidden="true">
    <div class="bg-blob b1"></div>
    <div class="bg-blob b2"></div>
    <div class="bg-blob b3"></div>
    <div class="bg-blob b4"></div>
    <div class="bg-blob b5"></div>
    <div class="bg-blob b6"></div>
  </div>

  <div id="root"></div>

  <!-- Lucide icons CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Scroll progress controller -->
  <script>
    (function() {
      const bar = document.getElementById('scrollProgress');
      window.addEventListener('scroll', function() {
        const h = document.documentElement;
        const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
        bar.style.width = pct + '%';
      }, { passive: true });
    })();
  </script>

  <!-- App scripts -->
  <script type="text/babel" src="src/primitives.jsx"></script>
  <script type="text/babel" src="src/halftone.jsx"></script>
  <script type="text/babel" src="src/shell.jsx"></script>
  <script type="text/babel" src="src/pages-1.jsx"></script>
  <script type="text/babel" src="src/pages-2.jsx"></script>
  <script type="text/babel" src="src/pages-3.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
